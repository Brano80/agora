const TABS = ['Overview','Scenarios','UBC vs cash UBI','Distribution','Sectors','Policy frontier','Multi-region (Q2)','Uncertainty','Assumptions'];

const charts = [];

function line(ctx, datasets, opts={}) {
  charts.push(new Chart(ctx, { type:'line',
    data:{ labels:YRS, datasets:datasets.map(d=>({ label:d.l, data:d.y, borderColor:d.c,
      backgroundColor:d.c, borderWidth:2, pointRadius:0, tension:.25, borderDash:d.dash||[] })) },
    options:{ responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
      plugins:{ legend:{labels:{boxWidth:14,font:{size:11}}} },
      scales:{ x:{ticks:{maxTicksLimit:8,font:{size:10}},grid:{display:false}},
               y:{ticks:{font:{size:10}}, ...(opts.y||{})} } } }));
}
function bars(ctx, labels, datasets, opts={}) {
  charts.push(new Chart(ctx, { type:'bar',
    data:{ labels, datasets },
    options:{ responsive:true, maintainAspectRatio:false, indexAxis:opts.h?'y':'x',
      plugins:{ legend:{display:datasets.length>1,labels:{boxWidth:14,font:{size:11}}} },
      scales:{ x:{ticks:{font:{size:10}},grid:{display:!!opts.h}}, y:{ticks:{font:{size:10}}} } } }));
}
function panel(title, note, id, h=240) {
  return `<div class="panel"><h3>${title}</h3><p class="note">${note}</p><div class="ch" style="height:${h}px"><canvas id="${id}"></canvas></div></div>`;
}
function gateBadge(runs) {
  const ok = Object.values(runs).every(r=>r.consistent);
  return `<span class="b ${ok?'ok':'fail'}">${ok?'gate: all scenarios consistent':'GATE FAILURE'}</span>`;
}

const R = {};
R['Overview'] = () => {
  const g = DATA.geos[geo]; const m = DATA.meta;
  const liveN = Object.values(g.sources).filter(s=>s==='live').length;
  let h = `<div class="cards">
    <div class="card"><div class="v">${m.countries_available.length}</div><div class="l">EU snapshots ready (26 members + EA20; LU excluded by design)</div></div>
    <div class="card"><div class="v ok">${m.tests}</div><div class="l">tests passing · every run consistency-gated</div></div>
    <div class="card"><div class="v ok">PASS</div><div class="l">DE historical backtest 2010-19: GDP ${m.backtest.DE.gdp_mae_pct}% · debt ${m.backtest.DE.debt_mae_pct}% MAE</div></div>
    <div class="card"><div class="v">${liveN}/${Object.keys(g.sources).length}</div><div class="l">${geo} series from live pulls (rest sourced snapshot)</div></div></div>`;
  h += `<div class="grid"><div class="panel"><h3>Validate before trusting — ${geo} baseline vs national accounts</h3>
    <p class="note">Year-0 must reproduce the country's own published targets before any scenario is run on it.</p>
    <table><tr><th>Metric</th><th class="num">Target</th><th class="num">Model</th><th class="num">Error</th><th></th></tr>`;
  g.validation.forEach(r=>{ h+=`<tr><td>${r.metric}</td><td class="num">${fmt(r.target)}</td>
    <td class="num">${fmt(r.model)}</td><td class="num">${pct(r.rel_err,2)}</td>
    <td><span class="b ${r.ok?'ok':'fail'}">${r.ok?'OK':'OFF'}</span></td></tr>`; });
  h += `</table></div><div class="panel"><h3>Data provenance — ${geo}</h3>
    <p class="note">Every parameter is sourced and swappable. obs_year mismatches are flagged at build time.</p>
    <table><tr><th>Series</th><th>Provider</th><th>Source</th></tr>`;
  Object.entries(g.sources).forEach(([k,s])=>{ h+=`<tr><td>${k}</td><td>${(g.params&&k==='labour_share')?'AMECO':'Eurostat/BIS/WID'}</td>
    <td><span class="b ${s==='live'?'live':'snap'}">${s}</span></td></tr>`; });
  h += `</table></div></div>
  <div class="disclaim"><b>Principles.</b> Sandbox, not oracle — compares policies, never forecasts. No single “best”: trade-offs are reported on five objectives and the values judgment stays with you. Flagged: IE (MNC-inflated GDP), LU (entrepôt, excluded).</div>`;
  return h;
};
R['Scenarios'] = () => {
  const t = DATA.geos[geo].triad;
  let h = `<div class="row">${gateBadge(t)}</div><div class="grid">`;
  h += panel('GDP (MEUR, current prices)','Baseline drift vs AI capex boom vs boom + settlement.','c1');
  h += panel('Labour share of output (%)','The decoupling: AI shifts income from wages to capital.','c2');
  h += panel('Personal Gini (disposable income)','Lognormal market income + exact transfer incidence; anchored to observed EU-SILC Gini at year 0.','c3');
  h += panel('At-risk-of-poverty rate','Share below 60% of median. Transfers create a hard income floor.','c4');
  h += panel('Government debt (% GDP)','Equal-cost policy arms: deficit path identical across scenarios.','c5');
  h += panel('Net foreign assets (% GDP)','Open economy: current account accumulates as NFA vs rest of world.','c6');
  h += '</div>';
  setTimeout(()=>{ const mk=(id,key,scale)=>line(document.getElementById(id),
      Object.entries(t).map(([n,e])=>({l:n,y:scale?e[key].map(v=>v==null?null:v*scale):e[key],c:C[n]})));
    mk('c1','gdp'); mk('c2','labour_share'); mk('c3','gini_personal');
    mk('c4','poverty_rate',100); mk('c5','gov_debt_gdp'); mk('c6','nfa_gdp'); });
  return h;
};
R['UBC vs cash UBI'] = () => {
  const u = DATA.geos[geo].ubc;
  const cash = u['AI + Cash UBI'], ubc = u['AI + Universal Basic Capital'];
  let cross=null; for (let i=0;i<YRS.length;i++) if (ubc.transfer_pool[i]>cash.transfer_pool[i]) { cross=YRS[i]; break; }
  let h = `<div class="row">${gateBadge(u)}</div><div class="cards">
    <div class="card"><div class="v">${cross??'–'}</div><div class="l">year the compounding UBC dividend overtakes the flat cash UBI</div></div>
    <div class="card"><div class="v">${pct(ubc.swf_share[YRS.length-1])}</div><div class="l">citizens' fund share of the capital stock at horizon</div></div>
    <div class="card"><div class="v">${pct(ubc.poverty_rate[YRS.length-1])} vs ${pct(cash.poverty_rate[YRS.length-1])}</div><div class="l">poverty at horizon: UBC vs cash UBI (UBC's dividend clears the 60%-of-median line outright)</div></div>
    <div class="card"><div class="v">€${fmt(ubc.citizen_wealth_pc[YRS.length-1]*1e6/ (DATA.geos[geo].params.population||1),0)}</div><div class="l">citizen capital endowment per person at horizon (cash UBI: €0)</div></div></div>`;
  h += `<div class="grid">`;
  h += panel('Annual transfer pool (MEUR)','Same levy intensity τ=40% of capital income; only the FORM differs — flow (cash) vs stock (in-kind dilution into a citizens\' fund).','u1');
  h += panel('Personal Gini','Both compress; UBC keeps compressing as the endowment compounds.','u2');
  h += panel('Poverty rate (%)','Honest floor arithmetic: cash UBI never clears the line; UBC does.','u3');
  h += panel('Top-10% wealth share','The dimension UBC actually targets: cash UBI leaves wealth concentration untouched.','u4');
  h += panel('Capital ownership','Private owners\' share vs the citizens\' fund (UBC arm).','u5');
  h += panel('GDP (MEUR)','Equal-cost arms under the identical AI shock.','u6');
  h += '</div>';
  setTimeout(()=>{ const E = Object.entries(u);
    line(document.getElementById('u1'), E.map(([n,e])=>({l:n,y:e.transfer_pool,c:C[n]})));
    line(document.getElementById('u2'), E.map(([n,e])=>({l:n,y:e.gini_personal,c:C[n]})));
    line(document.getElementById('u3'), E.map(([n,e])=>({l:n,y:e.poverty_rate.map(v=>v*100),c:C[n]})));
    line(document.getElementById('u4'), E.map(([n,e])=>({l:n,y:e.top10_wealth_share,c:C[n]})));
    line(document.getElementById('u5'), [{l:'private owners (UBC arm)',y:ubc.owners_capital_share,c:'#b45309'},
      {l:"citizens' fund (UBC arm)",y:ubc.swf_share,c:'#059669'}]);
    line(document.getElementById('u6'), E.map(([n,e])=>({l:n,y:e.gdp,c:C[n]}))); });
  return h;
};

      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.dataset.label}} },
        scales:{ x:{title:{display:true,text:document.getElementById('fx').selectedOptions[0].text,font:{size:11}},ticks:{font:{size:10}}},
                 y:{title:{display:true,text:document.getElementById('fy').selectedOptions[0].text,font:{size:11}},ticks:{font:{size:10}}} } } }));
  };
  setTimeout(()=>{ document.getElementById('fx').onchange=draw; document.getElementById('fy').onchange=draw; draw(); });
  return h;
};
R['Multi-region (Q2)'] = () => {
  const q = DATA.q2_eu || DATA.q2; const all = DATA.meta.q2_all_eu;
  const nC = q.cash_ubi.geos.length;
  let h = `<div class="row"><span class="b ${q.cash_ubi.consistent&&q.ubc.consistent?'ok':'fail'}">both arms gated across ${nC} countries — pooling transfers run through each country's books, iterated to a fixed point</span></div><div class="cards">`;
  ['cash_ubi','ubc'].forEach(f=>{ const c=q[f]; const n=c.gini_national.at(-1), g=c.gini_global.at(-1);
    h+=`<div class="card"><div class="v">${(100*(1-g/n)).toFixed(0)}%</div>
      <div class="l">${f==='cash_ubi'?'Cash UBI':'UBC'}: between-country gap narrowing from global pooling (Gini ${n.toFixed(3)} → ${g.toFixed(3)})</div></div>`;});
  if (q.cash_ubi.givers) { h += `<div class="card"><div class="v" style="font-size:14px">${q.cash_ubi.givers.join(' · ')} → ${q.cash_ubi.receivers.join(' · ')}</div><div class="l">top givers → receivers (cash UBI)</div></div>
    <div class="card"><div class="v" style="font-size:14px">${q.ubc.givers.join(' · ')} → ${q.ubc.receivers.join(' · ')}</div><div class="l">top givers → receivers (UBC; ~3× cash per-capita volumes — pooled stock claims compound)</div></div>`; }
  h += `</div><div class="grid">`;
  h += panel(`Cash UBI — between-country Gini (${nC} countries)`,'National dividend vs globally pooled dividend. Pooling carries a demand multiplier: receivers gain more than the transfer itself.','q1');
  h += panel(`UBC — between-country Gini (${nC} countries)`,'Fixed-point pooling narrows under both forms, slightly more under UBC (F11 amended: the single-pass overshoot was a solver artifact).','q2');
  h += `<div class="panel" style="grid-column:1/-1"><h3>Who gives, who receives (€ per capita at horizon)</h3>
    <p class="note">Net pooling transfer per person; sums to ~0 across the bloc by construction. IE excluded (MNC-inflated GDP).</p>
    <div class="row"><select class="sel" id="qf"><option value="cash_ubi">Cash UBI</option><option value="ubc">UBC</option></select></div>
    <div class="ch" style="height:420px"><canvas id="q3"></canvas></div></div></div>`;
  const drawT = (f) => {
    charts.filter(c=>c.canvas.id==='q3').forEach(c=>{c.destroy(); charts.splice(charts.indexOf(c),1);});
    const c=q[f]; const gs=[...c.geos].sort((a,b)=>c.transfer_pc[a]-c.transfer_pc[b]);
    bars(document.getElementById('q3'), gs,
      [{label:'€/capita', data:gs.map(g=>1e6*c.transfer_pc[g]),
        backgroundColor:gs.map(g=>c.transfer_pc[g]>=0?'#059669':'#dc2626')}], {h:true});
  };
  setTimeout(()=>{ ['cash_ubi','ubc'].forEach((f,i)=>{ const c=q[f];
      line(document.getElementById('q'+(i+1)), [
        {l:'national dividend',y:c.gini_national,c:'#dc2626'},
        {l:'global pooled dividend',y:c.gini_global,c:'#059669'}]); });
    const sel=document.getElementById('qf'); sel.onchange=()=>drawT(sel.value); drawT('cash_ubi'); });
  return h;
};
R['Uncertainty'] = () => {
  const mc = DATA.mc;
  const M = {gini:['Personal Gini (end)',1], poverty:['Poverty rate (end)',100],
             citizen_wealth_pc:['Citizen wealth €/capita',1], dividend_pc:['Dividend €/capita/yr',1], gdp_end:['GDP end (MEUR)',1]};
  let h = `<div class="row"><span class="note">Monte-Carlo over the priors below (DE, τ=40%, 30y, ${mc.ubc.used}+${mc.cash_ubi.used} consistent draws; divergent draws skipped by the gate). Bars span p5–p95, marker = median.</span></div><div class="grid">`;
  Object.keys(M).forEach((k,i)=>{ h += panel(M[k][0],'UBC (green) vs cash UBI (blue)','m'+i,140); });
  h += `<div class="panel"><h3>Priors (inspectable, swappable)</h3><table><tr><th>Input</th><th class="num">Low</th><th class="num">High</th></tr>`;
  Object.entries(DATA.meta.priors).forEach(([k,v])=>{ h+=`<tr><td>${k}</td><td class="num">${v[0]}</td><td class="num">${v[1]}</td></tr>`;});
  h += `</table></div></div>`;
  setTimeout(()=>{ Object.keys(M).forEach((k,i)=>{ const s=M[k][1];
    const u=mc.ubc.bands[k], c=mc.cash_ubi.bands[k];
    charts.push(new Chart(document.getElementById('m'+i), { type:'bar',
      data:{ labels:['UBC','Cash UBI'], datasets:[
        {label:'p5–p95', data:[[u.p5*s,u.p95*s],[c.p5*s,c.p95*s]], backgroundColor:['#05966955','#2563eb55'], borderColor:['#059669','#2563eb'], borderWidth:1.5, borderSkipped:false},
        {label:'median', data:[u.p50*s,c.p50*s], type:'scatter', pointStyle:'line', pointRadius:14, pointBorderWidth:3, pointBorderColor:['#059669','#2563eb']}] },
      options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
        plugins:{legend:{display:false}}, scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:11}}}} } })); }); });
  return h;
};
R['Assumptions'] = () => {
  const g = DATA.geos[geo];
  let h = `<div class="grid"><div class="panel"><h3>Calibrated parameters — ${geo}</h3>
    <p class="note">Closed-form calibration; every value derives from the sourced baseline and is swappable.</p>
    <table><tr><th>Parameter</th><th class="num">Value</th></tr>`;
  Object.entries(g.params).forEach(([k,v])=>{ if(typeof v==='number') h+=`<tr><td>${k}</td><td class="num">${fmt(v,4)}</td></tr>`;});
  h += `</table></div><div class="panel"><h3>Calibration targets — ${geo} 2019</h3>
    <table><tr><th>Target</th><th class="num">Value</th></tr>`;
  Object.entries(g.targets).forEach(([k,v])=>{ h+=`<tr><td>${k}</td><td class="num">${fmt(v,1)}</td></tr>`;});
  h += `</table></div><div class="panel"><h3>Model notes</h3><table>`;
  Object.entries(g.notes).forEach(([k,v])=>{ h+=`<tr><td style="white-space:nowrap;vertical-align:top"><b>${k}</b></td><td>${v}</td></tr>`;});
  h += `</table></div></div>
  <div class="disclaim"><b>How to refresh:</b> this page carries results baked from the gated engine on ${DATA.meta.generated}. To regenerate after new data or model changes, ask Claude to “rebuild the AGORA dashboard artifact” in a Cowork session with the AGORA folder connected.</div>`;
  return h;
};

function render() {
  charts.splice(0).forEach(c=>c.destroy());
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.textContent===tab));
  document.getElementById('main').innerHTML = `<section class="on">${R[tab]()}</section>`;
}
render();
</script>
</body>
</html>
